apiVersion: apps/v1
kind: Deployment
metadata:
  name: kaayaka-re
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kaayaka-re
  template:
    metadata:
      labels:
        app: kaayaka-re
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kaayaka-re
          image: naveensasalu/kayaka-re:c98a6cdf6c89540e495a3746388ff112cad38826
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
